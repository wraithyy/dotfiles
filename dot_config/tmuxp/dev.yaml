# Layout:
#
#  [NeoVIM/Claude]
#  +-------------------+----------+
#  |                   |          |
#  |       nvim        |  claude  |
#  |                   |          |
#  +-------------------+----------+
#
#  [Terminal]
#  +------------------------------+
#  |             zsh              |
#  +------------------------------+
#
#  [GIT]
#  +------------------------------+
#  |           lazygit            |
#  +------------------------------+
display_name: workspace (nvim + claude + terminal + git)
session_name: dev
windows:
  - window_name: "NeoVIM/Claude"
    layout: main-vertical
    focus: true
    panes:
      - shell_command: nvim
        focus: true
      - claude
  - window_name: Terminal
    panes:
      - ""
  - window_name: GIT
    panes:
      - lazygit
